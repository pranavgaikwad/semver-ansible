---
- name: Build semver-analyzer (release)
  ansible.builtin.shell:
    cmd: >-
      source {{ ansible_env.HOME }}/.cargo/env &&
      cargo build --release
    chdir: "{{ semver_analyzer_path }}"
  args:
    executable: /bin/bash
  register: semver_build
  changed_when: "'Compiling' in semver_build.stderr"

- name: Verify semver-analyzer binary
  ansible.builtin.stat:
    path: "{{ semver_analyzer_path }}/target/release/semver-analyzer"
  register: semver_binary
  failed_when: not semver_binary.stat.exists

- name: Build frontend-analyzer-provider (release)
  ansible.builtin.shell:
    cmd: >-
      source {{ ansible_env.HOME }}/.cargo/env &&
      cargo build --release
    chdir: "{{ frontend_provider_path }}"
  args:
    executable: /bin/bash
  register: fap_build
  changed_when: "'Compiling' in fap_build.stderr"

- name: Verify frontend-analyzer-provider binary
  ansible.builtin.stat:
    path: "{{ frontend_provider_path }}/target/release/frontend-analyzer-provider"
  register: fap_binary
  failed_when: not fap_binary.stat.exists
