---
- name: Derive app name from app_path
  ansible.builtin.set_fact:
    app_name: "{{ app_path | basename }}"
  when: app_name is not defined and app_path is defined

- name: Derive app name from repo URL
  ansible.builtin.set_fact:
    app_name: "{{ app_repo_url | basename | regex_replace('\\.git$', '') }}"
  when: app_name is not defined and app_repo_url is defined

- name: Check if semver report already exists
  ansible.builtin.stat:
    path: "{{ outputs_dir }}/semver_report.json"
  register: semver_report

- name: Run semver-analyzer analyze
  ansible.builtin.shell:
    cmd: >-
      source {{ ansible_env.HOME }}/.nvm/nvm.sh &&
      source {{ ansible_env.HOME }}/.cargo/env &&
      export PATH="{{ ansible_env.HOME }}/.local/bin:$PATH" &&
      export YARN_ENABLE_SCRIPTS=false &&
      ./semver-analyzer analyze {{ language }}
      --repo {{ semver_analyze_repo_path }}
      --from {{ from_ref }}
      --to {{ to_ref }}
      --dep-repo {{ semver_analyze_dep_repo_path }}
      --dep-from {{ dep_from_ref }}
      --dep-to {{ dep_to_ref }}
      --dep-build-command "{{ dep_build_command }}"
      --build-command '{{ build_command }}'
      {% if pipeline_v2 | bool %}--pipeline-v2{% endif %}
      {% if no_llm | bool %}--no-llm{% endif %}
      {% if not (no_llm | bool) %}--llm-command "{{ llm_command }}"{% endif %}
      {% if not (no_llm | bool) and (llm_all_files | bool) %}--llm-all-files{% endif %}
      {% if not (no_llm | bool) %}--llm-timeout {{ llm_timeout }}{% endif %}
      -o {{ outputs_dir }}/semver_report.json
    chdir: "{{ workspace_dir }}"
  args:
    executable: /bin/bash
  when: not semver_report.stat.exists or (force_rerun | default(false) | bool)
  async: 7200
  poll: 30

- name: Verify semver report was generated
  ansible.builtin.stat:
    path: "{{ outputs_dir }}/semver_report.json"
  register: semver_report_verify
  failed_when: not semver_report_verify.stat.exists
