---
- name: Detect VM architecture
  ansible.builtin.set_fact:
    kantra_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Check if kantra is already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.kantra/kantra"
  register: kantra_exists

- name: Create kantra directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kantra"
    state: directory
    mode: "0755"

- name: Download kantra release
  ansible.builtin.get_url:
    url: "https://github.com/konveyor/kantra/releases/download/{{ kantra_release_version }}/kantra.linux.{{ kantra_arch }}.zip"
    dest: /tmp/kantra.zip
    mode: "0644"
  when: not kantra_exists.stat.exists

- name: Extract kantra release
  ansible.builtin.unarchive:
    src: /tmp/kantra.zip
    dest: "{{ ansible_env.HOME }}/.kantra"
    remote_src: true
  when: not kantra_exists.stat.exists

- name: Copy kantra and java-external-provider from container image
  ansible.builtin.shell:
    cmd: |
      id=$(podman create {{ kantra_image }} 2>/dev/null)
      podman cp "$id":/usr/local/bin/kantra {{ ansible_env.HOME }}/.kantra/kantra
      podman cp "$id":/usr/local/bin/java-external-provider {{ ansible_env.HOME }}/.kantra/java-external-provider
      podman rm "$id" >/dev/null
  args:
    executable: /bin/bash
  become: true
  when: not kantra_exists.stat.exists

- name: Make kantra binaries executable
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kantra/{{ item }}"
    mode: "0755"
  loop:
    - kantra
    - java-external-provider

- name: Symlink kantra to PATH
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.kantra/kantra"
    dest: "{{ ansible_env.HOME }}/.local/bin/kantra"
    state: link
    force: true

- name: Clean up kantra zip
  ansible.builtin.file:
    path: /tmp/kantra.zip
    state: absent
